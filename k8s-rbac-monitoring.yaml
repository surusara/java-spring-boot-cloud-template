# RBAC for Payments Stream Monitoring Dashboard
#
# Grants the payments-stream ServiceAccount read-only access to pods,
# deployments, HPAs, and KEDA ScaledObjects so the monitoring dashboard
# can query the Kubernetes API from inside the pod.
#
# Deploy this BEFORE enabling K8S_ENABLED=true in the Deployment.
#
# Apply:
#   kubectl apply -f k8s-rbac-monitoring.yaml -n financial-streams
#
# Verify:
#   kubectl auth can-i list pods --as=system:serviceaccount:financial-streams:payments-stream -n financial-streams
#
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payments-stream-monitoring-reader
  namespace: financial-streams
  labels:
    app: payments-stream
    component: monitoring
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payments-stream-monitoring-reader-binding
  namespace: financial-streams
  labels:
    app: payments-stream
    component: monitoring
subjects:
  - kind: ServiceAccount
    name: payments-stream
    namespace: financial-streams
roleRef:
  kind: Role
  name: payments-stream-monitoring-reader
  apiGroup: rbac.authorization.k8s.io
