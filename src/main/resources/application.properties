
spring.profiles.active=dev

# ============================================================================
# Server
# ============================================================================
server.port=8080
server.servlet.context-path=/api/fs

# ============================================================================
# Spring Application
# ============================================================================
spring.application.name=kafka-streams-cb

# ============================================================================
# SECTION 2: Kafka Plain Producer Configuration (KafkaProducerConfig.java)
# ============================================================================
spring.kafka.bootstrap-servers=localhost:9092

# "all" = acknowledged by ALL in-sync replicas. Guarantees zero data loss.
spring.kafka.producer.acks=all
# Broker deduplicates retried sends via producer ID + sequence number. Prevents retry-duplicates.
spring.kafka.producer.enable-idempotence=true
# Max unacknowledged requests. 5 is the max with idempotence — Kafka rejects out-of-order sequences.
spring.kafka.producer.max-in-flight-requests-per-connection=5
# Effectively infinite retries. Bounded by delivery-timeout-ms instead.
spring.kafka.producer.retries=2147483647
# Wait 5ms to accumulate records into batches — improves throughput with minimal latency.
spring.kafka.producer.linger-ms=5
# 64KB batch size. Good balance for ~1-2KB financial events.
spring.kafka.producer.batch-size=65536
# 64MB total buffer. send() blocks if full (up to max-block-ms).
spring.kafka.producer.buffer-memory=67108864
# 2 min total delivery window including retries. TimeoutException if exceeded.
spring.kafka.producer.delivery-timeout-ms=120000
# 30 sec per broker request. Most acks return in <100ms.
spring.kafka.producer.request-timeout-ms=30000
# 60 sec max blocking when buffer full or metadata unavailable.
spring.kafka.producer.max-block-ms=60000
# lz4: fastest compression, low CPU overhead. Best for high-throughput financial events.
# Options: none, gzip (best ratio), snappy (balanced), lz4 (fastest), zstd (best overall).
spring.kafka.producer.compression-type=lz4
# --- Transactional Producer (Exactly-Once Delivery) ---
# Enables Kafka transactions. Spring appends a unique suffix per producer instance.
# ${random.uuid} guarantees globally unique ID per JVM start — no cross-pod collision.
# Note: zombie fencing requires the SAME transactional.id on restart (only works with StatefulSet + ${HOSTNAME}).
# With Deployments, UUID is the correct choice — fencing won't work regardless of ID scheme.
# Downstream consumers MUST set isolation.level=read_committed to benefit.
# Orphaned IDs from crashed pods are auto-cleaned after transactional.id.expiration.ms (default 7 days).
spring.kafka.producer.transactional-id-prefix=payments-producer-${random.uuid}-
# How long broker waits before force-aborting a pending transaction. Must be <= broker's
# transaction.max.timeout.ms (default 900s). Prevents zombie transactions from blocking consumers.
spring.kafka.producer.transaction-timeout-ms=60000

# ============================================================================
# Springdoc OpenAPI / Swagger UI
# Enabled by default for local dev. Disabled in preprod/prod via profile-specific config.
# In K8s: set SPRING_PROFILES_ACTIVE=prod (or preprod) in ConfigMap/env to disable.
# ============================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================================================
# Management / Actuator
# ============================================================================
# --- Separate Management Port ---
# Actuator runs on port 9090 (isolated from business APIs on 8080).
# Kubelet probes and Prometheus scrape this port directly — no mTLS/SPIFFE required.
# Business APIs on 8080 remain fully protected behind S2S authentication.
management.server.port=9090
management.endpoints.web.exposure.include=health,info,metrics,prometheus,runtime

# --- Runtime Discovery ---
# Deployment verification endpoint. Safe to call in prod — all data is local,
# sensitive values are redacted. Not used by AKS probes.
# GET /actuator/runtime on management port 9090.
management.endpoint.runtime.cache.time-to-live=5s

# --- Health Probes ---
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# --- Liveness Group ---
# Determines if the pod should be RESTARTED. Only include checks for
# unrecoverable states. Kafka broker being down is NOT a reason to restart.
management.health.livenessState.enabled=true

# --- Readiness Group ---
# Determines if the pod can RECEIVE traffic. Include Kafka connectivity
# and circuit breaker state — if Kafka is down or breaker is open,
# the pod is not ready to process.
management.health.readinessState.enabled=true

# Include Kafka health check in overall health assessment
management.health.kafka.enabled=true

# ============================================================================
# Confluent Cloud SASL/SSL Authentication
# Required for Confluent Cloud Kafka clusters. Set via environment variables
# in K8s (ConfigMap for non-secret, Secret for JAAS config).
#
# In K8s:
#   APP_STREAM_SECURITY_PROTOCOL=SASL_SSL
#   APP_STREAM_SASL_MECHANISM=PLAIN
#   APP_STREAM_SASL_JAAS_CONFIG=org.apache.kafka.common.security.plain.PlainLoginModule required username="<API_KEY>" password="<API_SECRET>";
#
# For local dev with Confluent Cloud, uncomment and set values below:
# ============================================================================
#app.stream.security.protocol=SASL_SSL
#app.stream.sasl.mechanism=PLAIN
#app.stream.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="${CONFLUENT_API_KEY}" password="${CONFLUENT_API_SECRET}";

# ============================================================================
# Pipeline Stage Metrics — Micrometer Timer Histograms
# Enables p50/p95/p99 percentiles and Prometheus histogram buckets.
# Metrics emitted: pipeline_stage_duration_seconds{stage="..."}
# ============================================================================
management.metrics.distribution.percentiles.pipeline.stage.duration=0.5,0.95,0.99
management.metrics.distribution.percentiles-histogram.pipeline.stage.duration=true

# ============================================================================
# SECTION 1: Kafka Streams Consumer Configuration (KafkaStreamsConfig.java)
# ============================================================================
app.input.topic=payments.input
app.output.topic=payments.output

# --- Streams Core Properties ---
app.stream.application-id=payments-stream-v1
app.stream.processing-guarantee=exactly_once_v2
app.stream.num-stream-threads=1
app.stream.commit-interval-ms=1000
# [Default] State dir for task metadata. Kafka Streams creates subdirs per application.id automatically.
# Using default /tmp/kafka-streams. In K8s, emptyDir is mounted here (readOnlyRootFilesystem: true).
app.stream.state-dir=/tmp/kafka-streams
app.stream.replication-factor=3
# No standby replicas needed — topology is stateless (no state stores to replicate).
app.stream.num-standby-replicas=0
app.stream.max-task-idle-ms=1000

# --- KEDA Cooperative Rebalancing & Static Membership ---
# Static group membership: use pod hostname as member identity.
# Prevents rebalance storms during KEDA scale-up/down.
# Set via env var HOSTNAME in K8s; local dev uses fallback.
app.stream.group-instance-id=${HOSTNAME:local-dev-instance}
# Don't trigger rebalance when a consumer closes gracefully.
# Combined with session-timeout-ms, KEDA can remove pods without rebalance.
app.stream.internal-leave-group-on-close=false

# --- Consumer Overrides (inside streams topology) ---
app.stream.consumer.auto-offset-reset=latest
app.stream.consumer.max-poll-records=250
# Max time between poll() calls before Kafka kicks the consumer.
# 12 min: must be >= session-timeout-ms. Covers max circuit breaker delay (10m) + 2m buffer.
app.stream.consumer.max-poll-interval-ms=720000
# How long Kafka waits with no heartbeat before declaring consumer dead.
# 12 min: covers max circuit breaker restart delay (10m) + 2m buffer.
# During breaker OPEN, partitions stay reserved on this pod for up to 12 min.
# Truly dead pods are caught faster by K8s liveness probes (~30s).
app.stream.consumer.session-timeout-ms=720000
# How often the consumer sends "I'm alive" to the group coordinator.
# Must be < session-timeout-ms / 3 (720000/3 = 240s). 10 sec is well within limit.
app.stream.consumer.heartbeat-interval-ms=10000
app.stream.consumer.request-timeout-ms=30000
app.stream.consumer.retry-backoff-ms=500
app.stream.consumer.fetch-max-bytes=52428800
app.stream.consumer.max-partition-fetch-bytes=1048576

# --- Internal Producer Overrides (inside streams topology) ---
app.stream.producer.acks=all
app.stream.producer.linger-ms=5
app.stream.producer.batch-size=65536
app.stream.producer.buffer-memory=67108864

# ============================================================================
# Circuit Breaker
# ============================================================================
app.circuit-breaker.failure-rate-threshold=20
app.circuit-breaker.time-window-seconds=1800
app.circuit-breaker.minimum-number-of-calls=100
app.circuit-breaker.permitted-calls-in-half-open-state=20
app.circuit-breaker.max-wait-in-half-open-state=2m
# Gradual recovery schedule after breaker trips: 1, 2, 3, 5, 7, 10 min.
# 6 attempts before settling at 10m. Max single delay (10m) < session-timeout-ms (12m)
# so partitions stay reserved on this pod during every recovery attempt.
app.circuit-breaker.restart-delays[0]=1m
app.circuit-breaker.restart-delays[1]=2m
app.circuit-breaker.restart-delays[2]=3m
app.circuit-breaker.restart-delays[3]=5m
app.circuit-breaker.restart-delays[4]=7m
app.circuit-breaker.restart-delays[5]=10m
app.circuit-breaker.scheduler-delay-ms=5000

# Kubernetes: preStop hook should be configured to allow graceful shutdown
# See PRODUCTION_DEPLOYMENT_GUIDE.md for Kubernetes deployment configuration
# Example preStop configuration:
#   lifecycle:
#     preStop:
#       exec:
#         command: ["/bin/sh", "-c", "sleep 60"]
#   terminationGracePeriodSeconds: 120

# ============================================================================
# Profile-specific: preprod & prod — disable Swagger
# Use SPRING_PROFILES_ACTIVE=preprod or prod in K8s ConfigMap/env
# ============================================================================
# spring.config.activate.on-profile=preprod
# springdoc.api-docs.enabled=false
# springdoc.swagger-ui.enabled=false
#
# spring.config.activate.on-profile=prod
# springdoc.api-docs.enabled=false
# springdoc.swagger-ui.enabled=false
#
# NOTE: application.properties does not support multi-document (---) separators.
# For profile-specific overrides, create separate files:
#   application-preprod.properties  → springdoc.api-docs.enabled=false, springdoc.swagger-ui.enabled=false
#   application-prod.properties     → springdoc.api-docs.enabled=false, springdoc.swagger-ui.enabled=false
